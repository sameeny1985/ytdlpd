<!DOCTYPE html>
<html lang="fa">
<head>

<meta charset="UTF-8">
<title>YouTube Downloader</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="/static/manifest.json">

<style>

body{
background:#0f0f0f;
color:white;
font-family:tahoma;
margin:0;
padding:0;
text-align:center;
}

header{
background:#111;
padding:20px;
font-size:26px;
color:#00eaff;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
height:110px;
font-size:16px;
padding:10px;
border:none;
border-radius:5px;
}

.buttons{
margin-top:15px;
}

button{

padding:12px 25px;
font-size:16px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
background:#00eaff;
color:black;

}

button:hover{
background:#00b5c9;
}

select{
padding:10px;
font-size:15px;
}

.videoCard{

background:#1b1b1b;
padding:15px;
margin-top:15px;
border-radius:6px;

}

.videoCard img{
width:220px;
border-radius:4px;
}

.progressBox{

margin-top:30px;

}

.progressBar{

width:100%;
background:#333;
height:25px;
border-radius:5px;
overflow:hidden;

}

.progressFill{

height:100%;
background:#00eaff;
width:0%;

}

#downloadLink{

margin-top:20px;
font-size:20px;

}

#downloadLink a{

color:#00ff6a;

}

.installBtn{

position:fixed;
bottom:20px;
right:20px;
background:#00ff6a;
color:black;
padding:12px;
border-radius:50px;
cursor:pointer;

}

</style>

</head>

<body>

<header>
YouTube Downloader
</header>

<div class="container">

<textarea id="links" placeholder="لینک یوتیوب را اینجا پیست کن"></textarea>

<div class="buttons">

<select id="quality">
<option value="240">240p</option>
<option value="360" selected>360p</option>
<option value="best">Best</option>
</select>

<br>

<button onclick="analyze()">تحلیل</button>
<button onclick="startDownload()">شروع دانلود</button>

</div>

<div id="results"></div>

<div class="progressBox">

<div class="progressBar">
<div id="bar" class="progressFill"></div>
</div>

<div id="status"></div>

</div>

<div id="downloadLink"></div>

</div>

<div id="installBtn" class="installBtn" style="display:none">
نصب اپ
</div>

<script>

let lastFile=""
let deferredPrompt

function analyze(){

fetch("/analyze",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
links:document.getElementById("links").value
})

})
.then(r=>r.json())
.then(data=>{

let html=""

data.items.forEach(v=>{

html+=`
<div class="videoCard">
<img src="${v.thumbnail}">
<br>
${v.title}
</div>
`

})

document.getElementById("results").innerHTML=html

})

}

function startDownload(){

fetch("/start",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

links:document.getElementById("links").value,
quality:document.getElementById("quality").value

})

})

}

function updateProgress(){

fetch("/progress")

.then(r=>r.json())

.then(p=>{

document.getElementById("status").innerHTML=

"وضعیت: "+p.state+
"<br>"+p.percent+
"<br>"+p.speed+
"<br>"+p.eta

let percent=parseFloat(p.percent)

if(!isNaN(percent)){

document.getElementById("bar").style.width=percent+"%"

}

if(p.filename){

lastFile=p.filename

}

if(p.state=="done" && lastFile){

document.getElementById("downloadLink").innerHTML=

`<a href="/download/${lastFile}">دانلود فایل</a>`

}

})

}

setInterval(updateProgress,2000)

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("installBtn").style.display="block"

})

document.getElementById("installBtn").onclick=async()=>{

if(!deferredPrompt) return

deferredPrompt.prompt()

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register("/static/service-worker.js")

}

</script>

</body>

</html>
